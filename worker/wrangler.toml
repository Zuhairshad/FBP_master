name = "fbp-worker"
main = "src/index.ts"
compatibility_date = "2026-07-10"
compatibility_flags = ["nodejs_compat"]

# Bindings (Supabase URL/keys, per-marketplace credentials, KV/queues for order
# sync, etc.) get added here as features land — see CLAUDE.md "Environment &
# secrets". Secrets go through `wrangler secret put <NAME>`, never in this file.
#
# Phase 5 (Shopify) needs, all via `wrangler secret put` in prod / `.dev.vars`
# locally (see worker/.dev.vars.example): SUPABASE_URL,
# SUPABASE_SERVICE_ROLE_KEY, SHOPIFY_CLIENT_ID, SHOPIFY_CLIENT_SECRET,
# SHOPIFY_SCOPES, APP_URL, WORKER_URL.
#
# Phase 6 (TikTok Shop) additionally needs: TIKTOK_APP_KEY, TIKTOK_APP_SECRET
# (no WORKER_URL equivalent — TikTok's OAuth redirect URI is registered in
# the Partner Center, not passed per request; see worker/src/tiktok/client.ts).
#
# Phase 7 (Amazon SP-API) additionally needs: AMAZON_CLIENT_ID,
# AMAZON_CLIENT_SECRET (the LWA app credentials used to mint short-lived
# access tokens from a brand-submitted refresh token — no APP_URL/WORKER_URL
# equivalent either, since there is no OAuth redirect flow at all for
# Amazon's self-authorization model; see worker/src/amazon/handlers.ts).
#
# Phase 8 (eBay) additionally needs: EBAY_CLIENT_ID, EBAY_CLIENT_SECRET,
# EBAY_RU_NAME (eBay's OAuth redirect_uri parameter must be a "RuName" it
# assigns per registered app, not a literal URL — see worker/src/ebay/client.ts),
# EBAY_VERIFICATION_TOKEN (for the mandatory marketplace-account-deletion
# endpoint challenge hash — see worker/src/ebay/handlers.ts). Reuses the
# existing APP_URL/WORKER_URL bindings.
#
# Phase 9 (Walmart) needs no new binding at all: Walmart's client-credentials
# grant uses only the brand-submitted client_id/client_secret stored in
# walmart_tokens — SUPABASE_URL/SUPABASE_SERVICE_ROLE_KEY (already present
# above) are the only bindings worker/src/walmart/ touches; see
# worker/src/walmart/env.ts.
